name: UNIDO

on:
  schedule:
    - cron: "12,42 * * * *"
  workflow_dispatch:

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          python -m playwright install chromium
      - name: Run checker
        env:
          SOURCE_URL: "https://careers.unido.org/search/?createNewAlert=false&q=&optionsFacetsDD_country=&optionsFacetsDD_lang=&optionsFacetsDD_department=&optionsFacetsDD_location=&locationsearch="
          UNIDO_LOCATION_FILTER: "Vienna, Austria"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_FILE: data/seen_unido.json
          MAX_ALERTS_PER_RUN: 10
          DRY_RUN: "true"
          BOOTSTRAP_MODE: "false"
        run: python scripts/browser/unido_playwright.py
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_unido.json
          git diff --cached --quiet || git commit -m "Update seen_unido.json"
          git push
